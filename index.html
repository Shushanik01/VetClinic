<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%DogPaw.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PawCare</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="notify-root"></div>
    <div id="pop-up"></div>
    <script>
      // Restore the path that 404.html encoded into the query string.
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
    <script src="%BASE_URL%config.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
