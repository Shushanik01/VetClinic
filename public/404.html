<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>PawCare</title>
    <script>
      // Redirect unknown paths back to index.html, preserving the route as a query param.
      // The slice(0, 2) keeps the repo-name segment (/VetClinic) in the redirect target.
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 2).join('/') +
          '/?p=/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(1)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
